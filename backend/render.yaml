services:
  - type: web
    name: giggs-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python create_admin.py"
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: DEBUG
        value: "False"
      - fromDatabase:
          name: giggs-db
          property: connectionString
        key: DATABASE_URL

databases:
  - name: giggs-db
    plan: free
